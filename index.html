<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Browser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f0f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .browser {
            display: flex;
            flex-direction: column;
            height: 100%;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .tabs {
            display: flex;
            gap: 5px;
            background: #f5f5f5;
            padding: 8px;
            border-bottom: 1px solid #ddd;
            overflow-x: auto;
        }

        .tab {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #e0e0e0;
            border: none;
            border-radius: 6px 6px 0 0;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tab:hover {
            background: #d0d0d0;
        }

        .tab.active {
            background: white;
            border-bottom: 2px solid white;
        }

        .tab-close {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 0;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tab-close:hover {
            background: rgba(0,0,0,0.1);
            border-radius: 3px;
        }

        .new-tab-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 0 10px;
            color: #666;
        }

        .toolbar {
            display: flex;
            gap: 8px;
            padding: 10px;
            background: #f8f8f8;
            border-bottom: 1px solid #ddd;
            align-items: center;
        }

        button {
            background: #e8e8e8;
            border: 1px solid #ccc;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        button:hover:not(:disabled) {
            background: #d8d8d8;
        }

        button:active:not(:disabled) {
            background: #c8c8c8;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .url-bar-container {
            display: flex;
            gap: 8px;
            flex: 1;
            position: relative;
        }

        .url-bar {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            font-family: monospace;
        }

        .url-bar:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
        }

        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ddd;
            border-top: none;
            max-height: 400px;
            overflow-y: auto;
            z-index: 100;
            display: none;
            margin-top: -4px;
            border-radius: 0 0 4px 4px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .search-results.show {
            display: block;
        }

        .search-result {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-result:hover {
            background: #f5f5f5;
        }

        .search-result-title {
            font-weight: bold;
            color: #1a73e8;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .search-result-url {
            color: #006621;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .search-result-snippet {
            color: #545454;
            font-size: 13px;
            line-height: 1.4;
        }

        .content {
            flex: 1;
            overflow: hidden;
            position: relative;
            background: white;
        }

        .page-container {
            width: 100%;
            height: 100%;
            overflow: auto;
        }

        .home-page {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 40px;
        }

        .home-page h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .home-page p {
            font-size: 18px;
            opacity: 0.9;
            margin-bottom: 50px;
        }

        .shortcuts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            max-width: 800px;
            margin-bottom: 30px;
        }

        .shortcut {
            background: rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .shortcut:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-5px);
        }

        .shortcut-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .shortcut-name {
            font-weight: bold;
        }

        .loading-bar {
            height: 3px;
            background: #4CAF50;
            width: 0%;
            position: absolute;
            top: 0;
            transition: width 0.3s;
            z-index: 10;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        /* "opened externally" confirmation page */
        .opened-page {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            padding: 40px;
            background: #fafafa;
        }

        .opened-page .icon {
            font-size: 56px;
            margin-bottom: 20px;
        }

        .opened-page h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 10px;
        }

        .opened-page .url-display {
            font-family: monospace;
            color: #006621;
            background: #fff;
            border: 1px solid #ddd;
            padding: 8px 14px;
            border-radius: 6px;
            margin: 15px 0 25px;
            word-break: break-all;
            max-width: 500px;
            font-size: 13px;
        }

        .opened-page .actions {
            display: flex;
            gap: 10px;
        }

        .opened-page button {
            padding: 10px 18px;
        }

        .blocked-note {
            margin-top: 20px;
            font-size: 13px;
            color: #999;
            max-width: 400px;
        }

        /* Settings page */
        .settings-page {
            height: 100%;
            overflow-y: auto;
            padding: 30px 40px;
            max-width: 700px;
            margin: 0 auto;
        }

        .settings-page h1 {
            font-size: 26px;
            margin-bottom: 25px;
            color: #222;
        }

        .settings-section {
            margin-bottom: 35px;
        }

        .settings-section h2 {
            font-size: 16px;
            color: #444;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #eee;
        }

        .engine-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
        }

        .engine-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            background: white;
            font-size: 14px;
            transition: all 0.15s;
        }

        .engine-option:hover {
            border-color: #aaa;
            background: #f8f8f8;
        }

        .engine-option.selected {
            border-color: #4CAF50;
            background: #f0fff0;
            font-weight: bold;
        }

        .engine-option .dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid #ccc;
            flex-shrink: 0;
        }

        .engine-option.selected .dot {
            border-color: #4CAF50;
            background: #4CAF50;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
            margin-bottom: 12px;
        }

        .history-header h2 {
            margin: 0;
            border: none;
            padding: 0;
        }

        .clear-history-btn {
            background: #fdecea;
            border: 1px solid #f5c6c0;
            color: #c0392b;
            font-size: 13px;
            padding: 6px 12px;
        }

        .clear-history-btn:hover {
            background: #fbd9d4;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 420px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: #f8f8f8;
            border-radius: 6px;
            border: 1px solid #eee;
        }

        .history-item .h-icon {
            font-size: 16px;
            flex-shrink: 0;
        }

        .history-item .h-main {
            flex: 1;
            min-width: 0;
            cursor: pointer;
        }

        .history-item .h-label {
            font-size: 13.5px;
            color: #1a4f8a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item .h-time {
            font-size: 11px;
            color: #999;
            margin-top: 2px;
        }

        .history-item .h-delete {
            background: none;
            border: none;
            color: #bbb;
            font-size: 16px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .history-item .h-delete:hover {
            background: #fdecea;
            color: #c0392b;
        }

        .history-empty {
            text-align: center;
            color: #999;
            padding: 30px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="browser">
        <!-- Tabs -->
        <div class="tabs" id="tabsContainer">
            <button class="tab active" data-id="0" onclick="switchTab(0)">
                📄 New Tab
                <button class="tab-close" onclick="closeTab(event, 0)">×</button>
            </button>
            <button class="new-tab-btn" onclick="addNewTab()">+</button>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <button onclick="goBack()" id="backBtn" title="Back">← Back</button>
            <button onclick="goForward()" id="forwardBtn" title="Forward">→ Forward</button>
            <button onclick="reloadPage()" id="reloadBtn" title="Reload">⟳ Reload</button>

            <div class="url-bar-container">
                <input type="text" id="urlBar" class="url-bar" placeholder="Search or enter URL..." onkeypress="handleKeyPress(event)" oninput="handleSearch(event)">
                <div class="search-results" id="searchResults"></div>
                <button onclick="navigateTo()">Go</button>
            </div>

            <button onclick="openSettings()" id="settingsBtn" title="Settings">⚙️ Settings</button>
        </div>

        <!-- Content Area -->
        <div class="content" id="contentArea">
            <div class="loading-bar" id="loadingBar"></div>
            <div class="page-container" id="pageContainer">
                <div class="home-page" id="homePage">
                    <h1>🌐 Web Browser</h1>
                    <p>A fully functional web browser built with HTML, CSS & JavaScript</p>
                    <div class="shortcuts">
                        <div class="shortcut" onclick="visitUrl('https://www.google.com')">
                            <div class="shortcut-icon">G</div>
                            <div class="shortcut-name">Google</div>
                        </div>
                        <div class="shortcut" onclick="visitUrl('https://www.wikipedia.org')">
                            <div class="shortcut-icon">W</div>
                            <div class="shortcut-name">Wikipedia</div>
                        </div>
                        <div class="shortcut" onclick="visitUrl('https://www.sites.google.com/view/gamewards')">
                            <div class="shortcut-icon">G</div>
                            <div class="shortcut-name">Gamewards</div>
                        </div>
                        <div class="shortcut" onclick="visitUrl('https://www.youtube.com')">
                            <div class="shortcut-icon">Y</div>
                            <div class="shortcut-name">YouTube</div>
                        </div>
                        <div class="shortcut" onclick="visitUrl('https://www.facebook.com')">
                            <div class="shortcut-icon">F</div>
                            <div class="shortcut-name">Facebook</div>
                        </div>
                        <div class="shortcut" onclick="visitUrl('https://www.chess.com')">
                            <div class="shortcut-icon">C</div>
                            <div class="shortcut-name">Chess</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ---------- Search engines (deep-link templates) ----------
        const SEARCH_ENGINES = {
            duckduckgo: { name: 'DuckDuckGo', icon: '🦆', url: 'https://duckduckgo.com/?q=' },
            google:     { name: 'Google',     icon: '🔍', url: 'https://www.google.com/search?q=' },
            bing:       { name: 'Bing',       icon: '🔎', url: 'https://www.bing.com/search?q=' },
            brave:      { name: 'Brave',      icon: '🦁', url: 'https://search.brave.com/search?q=' },
            yahoo:      { name: 'Yahoo',      icon: '🟣', url: 'https://search.yahoo.com/search?p=' },
            ecosia:     { name: 'Ecosia',     icon: '🌳', url: 'https://www.ecosia.org/search?q=' },
            startpage:  { name: 'Startpage',  icon: '🛡️', url: 'https://www.startpage.com/sp/search?query=' },
            yandex:     { name: 'Yandex',     icon: '🔴', url: 'https://yandex.com/search/?text=' }
        };

        let selectedEngine = localStorage.getItem('browser_search_engine') || 'duckduckgo';
        if (!SEARCH_ENGINES[selectedEngine]) selectedEngine = 'duckduckgo';

        function setSearchEngine(key) {
            if (!SEARCH_ENGINES[key]) return;
            selectedEngine = key;
            localStorage.setItem('browser_search_engine', key);
            // Re-render the engine grid to reflect new selection if settings is open
            const grid = document.getElementById('engineGrid');
            if (grid) renderEngineGrid();
        }

        // ---------- History ----------
        function loadHistory() {
            try {
                return JSON.parse(localStorage.getItem('browser_history') || '[]');
            } catch (e) {
                return [];
            }
        }

        function saveHistory(history) {
            localStorage.setItem('browser_history', JSON.stringify(history));
        }

        function addHistory(entry) {
            const history = loadHistory();
            history.unshift({
                id: Date.now() + '-' + Math.random().toString(36).slice(2, 7),
                type: entry.type,       // 'url' | 'search'
                label: entry.label,
                url: entry.url,
                timestamp: Date.now()
            });
            saveHistory(history.slice(0, 500)); // cap history length
            const list = document.getElementById('historyList');
            if (list) renderHistoryList();
        }

        function deleteHistoryItem(id) {
            const history = loadHistory().filter(h => h.id !== id);
            saveHistory(history);
            renderHistoryList();
        }

        function clearHistory() {
            if (!confirm('Clear all browsing history? This cannot be undone.')) return;
            saveHistory([]);
            renderHistoryList();
        }

        function formatTimestamp(ts) {
            const d = new Date(ts);
            return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function renderHistoryList() {
            const container = document.getElementById('historyList');
            if (!container) return;
            const history = loadHistory();

            if (history.length === 0) {
                container.innerHTML = '<div class="history-empty">No browsing history yet.</div>';
                return;
            }

            container.innerHTML = history.map(item => `
                <div class="history-item">
                    <span class="h-icon">${item.type === 'search' ? '🔎' : '🌐'}</span>
                    <div class="h-main" onclick="visitUrl('${item.url.replace(/'/g, "\\'")}')">
                        <div class="h-label">${item.label}</div>
                        <div class="h-time">${formatTimestamp(item.timestamp)}</div>
                    </div>
                    <button class="h-delete" title="Delete" onclick="deleteHistoryItem('${item.id}')">×</button>
                </div>
            `).join('');
        }

        function renderEngineGrid() {
            const grid = document.getElementById('engineGrid');
            if (!grid) return;
            grid.innerHTML = Object.entries(SEARCH_ENGINES).map(([key, eng]) => `
                <div class="engine-option ${key === selectedEngine ? 'selected' : ''}" onclick="setSearchEngine('${key}')">
                    <span class="dot"></span>
                    <span>${eng.icon} ${eng.name}</span>
                </div>
            `).join('');
        }

        function openSettings() {
            document.getElementById('searchResults').classList.remove('show');
            const container = document.getElementById('pageContainer');
            container.innerHTML = `
                <div class="settings-page">
                    <h1>⚙️ Settings</h1>

                    <div class="settings-section">
                        <h2>Default Search Engine</h2>
                        <div class="engine-grid" id="engineGrid"></div>
                    </div>

                    <div class="settings-section">
                        <div class="history-header">
                            <h2>Browsing History</h2>
                            <button class="clear-history-btn" onclick="clearHistory()">🗑️ Clear All History</button>
                        </div>
                        <div class="history-list" id="historyList"></div>
                    </div>
                </div>
            `;
            renderEngineGrid();
            renderHistoryList();
        }

        // ---------- Tab Management ----------
        let tabs = [{ id: 0, url: '', label: '', history: [], historyIndex: -1 }];
        let currentTabId = 0;
        let nextTabId = 1;

        function addNewTab() {
            const newId = nextTabId++;
            tabs.push({ id: newId, url: '', label: '', history: [], historyIndex: -1 });

            const tabsContainer = document.getElementById('tabsContainer');
            const newTab = document.createElement('button');
            newTab.className = 'tab active';
            newTab.setAttribute('data-id', newId);
            newTab.innerHTML = `
                📄 New Tab
                <button class="tab-close" onclick="closeTab(event, ${newId})">×</button>
            `;
            newTab.onclick = () => switchTab(newId);

            tabsContainer.insertBefore(newTab, tabsContainer.lastElementChild);
            switchTab(newId);
        }

        function closeTab(e, id) {
            e.stopPropagation();
            if (tabs.length === 1) {
                alert('Cannot close the last tab!');
                return;
            }

            tabs = tabs.filter(t => t.id !== id);
            document.querySelector(`[data-id="${id}"]`).remove();

            if (currentTabId === id) {
                switchTab(tabs[0].id);
            }
        }

        function switchTab(id) {
            currentTabId = id;

            document.querySelectorAll('.tab').forEach(t => {
                t.classList.remove('active');
                if (t.getAttribute('data-id') === String(id)) {
                    t.classList.add('active');
                }
            });

            const tab = tabs.find(t => t.id === id);
            document.getElementById('urlBar').value = tab.url;
            document.getElementById('searchResults').classList.remove('show');

            loadTabContent();
        }

        function getCurrentTab() {
            return tabs.find(t => t.id === currentTabId);
        }

        // ---------- Omnibox suggestions (DuckDuckGo Instant Answer - just for typeahead) ----------
        async function handleSearch(e) {
            const query = e.target.value.trim();

            if (!query || (query.includes('.') && !query.includes(' '))) {
                document.getElementById('searchResults').classList.remove('show');
                return;
            }

            try {
                const response = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`);
                const data = await response.json();

                const searchResults = document.getElementById('searchResults');
                let html = '';

                if (data.AbstractText) {
                    html += `
                        <div class="search-result">
                            <div class="search-result-title">${data.Heading}</div>
                            <div class="search-result-snippet">${data.AbstractText}</div>
                        </div>
                    `;
                }

                if (data.RelatedTopics && data.RelatedTopics.length > 0) {
                    data.RelatedTopics.slice(0, 6).forEach(topic => {
                        if (topic.Text) {
                            html += `
                                <div class="search-result" onclick="visitUrl('${topic.FirstURL}')">
                                    <div class="search-result-title">${topic.Text.substring(0, 100)}</div>
                                </div>
                            `;
                        }
                    });
                }

                if (html) {
                    searchResults.innerHTML = html;
                    searchResults.classList.add('show');
                } else {
                    searchResults.classList.remove('show');
                }
            } catch (error) {
                console.error('Suggestion error:', error);
                document.getElementById('searchResults').classList.remove('show');
            }
        }

        // ---------- Navigation ----------
        function navigateTo() {
            let input = document.getElementById('urlBar').value.trim();
            if (!input) return;

            document.getElementById('searchResults').classList.remove('show');
            visitUrl(input);
        }

        function visitUrl(input) {
            if (!input) return;

            const tab = getCurrentTab();
            let url, label;

            const looksLikeUrl = input.startsWith('http://') || input.startsWith('https://') ||
                                  (input.includes('.') && !input.includes(' '));

            if (looksLikeUrl) {
                url = input.startsWith('http://') || input.startsWith('https://') ? input : 'https://' + input;
                label = new URL(url).hostname;
                addHistory({ type: 'url', label: label, url: url });
            } else {
                const engine = SEARCH_ENGINES[selectedEngine];
                url = engine.url + encodeURIComponent(input);
                label = `"${input}" — ${engine.name}`;
                addHistory({ type: 'search', label: label, url: url });
            }

            if (!tab.history.length || tab.history[tab.history.length - 1] !== url) {
                tab.history.push(url);
                tab.historyIndex = tab.history.length - 1;
            }

            tab.url = url;
            tab.label = label;
            document.getElementById('urlBar').value = url;

            openInRealBrowser(url, label);
        }

        // Opens the URL in an actual new browser tab, since most real sites
        // block being embedded in an iframe (X-Frame-Options / CSP).
        function openInRealBrowser(url, label) {
            const loadingBar = document.getElementById('loadingBar');
            loadingBar.style.width = '50%';

            const newWindow = window.open(url, '_blank', 'noopener,noreferrer');

            setTimeout(() => {
                loadingBar.style.width = '100%';
                setTimeout(() => { loadingBar.style.width = '0%'; }, 300);
            }, 200);

            renderOpenedPage(url, !newWindow, label);
            updateTabTitle(currentTabId, label || new URL(url).hostname);
            updateNavButtons();
        }

        function renderOpenedPage(url, wasBlocked, label) {
            const container = document.getElementById('pageContainer');
            const heading = label || url;

            if (wasBlocked) {
                container.innerHTML = `
                    <div class="opened-page">
                        <div class="icon">🚫</div>
                        <h1>Pop-up blocked</h1>
                        <div class="url-display">${heading}</div>
                        <div class="actions">
                            <button onclick="openInRealBrowser('${url}', '${(label||'').replace(/'/g, "\\'")}')">Try Again</button>
                            <a href="${url}" target="_blank" rel="noopener noreferrer"><button>Open Manually</button></a>
                        </div>
                        <p class="blocked-note">Your browser blocked the pop-up. Click "Try Again" or allow pop-ups for this page.</p>
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div class="opened-page">
                        <div class="icon">↗️</div>
                        <h1>Opened in a new tab</h1>
                        <div class="url-display">${heading}</div>
                        <div class="actions">
                            <button onclick="openInRealBrowser('${url}', '${(label||'').replace(/'/g, "\\'")}')">Open Again</button>
                        </div>
                    </div>
                `;
            }
        }

        function goBack() {
            const tab = getCurrentTab();
            if (tab.historyIndex > 0) {
                tab.historyIndex--;
                tab.url = tab.history[tab.historyIndex];
                document.getElementById('urlBar').value = tab.url;
                loadTabContent();
            }
        }

        function goForward() {
            const tab = getCurrentTab();
            if (tab.historyIndex < tab.history.length - 1) {
                tab.historyIndex++;
                tab.url = tab.history[tab.historyIndex];
                document.getElementById('urlBar').value = tab.url;
                loadTabContent();
            }
        }

        function reloadPage() {
            const tab = getCurrentTab();
            if (tab.url) {
                openInRealBrowser(tab.url, tab.label);
            }
        }

        function updateTabTitle(tabId, title) {
            const tab = document.querySelector(`[data-id="${tabId}"]`);
            if (tab) {
                const titleText = title || 'New Tab';
                const closeBtn = tab.querySelector('.tab-close');
                tab.innerHTML = titleText + ' ';
                tab.appendChild(closeBtn);
            }
        }

        function loadTabContent() {
            const tab = getCurrentTab();
            const container = document.getElementById('pageContainer');

            if (!tab.url) {
                container.innerHTML = `<div class="home-page" id="homePage">
                    <h1>🌐 RuWeb Browser</h1>
                    <p>A fully functional web browser built with HTML, CSS & JavaScript</p>
                    <div class="shortcuts">
                        <div class="shortcut" onclick="visitUrl('https://www.google.com')">
                            <div class="shortcut-icon">G</div>
                            <div class="shortcut-name">Google</div>
                        </div>
                        <div class="shortcut" onclick="visitUrl('https://www.wikipedia.org')">
                            <div class="shortcut-icon">W</div>
                            <div class="shortcut-name">Wikipedia</div>
                        </div>
                        <div class="shortcut" onclick="visitUrl('https://www.sites.google.com/view/gamewards')">
                            <div class="shortcut-icon">G</div>
                            <div class="shortcut-name">Gamewards</div>
                        </div>
                        <div class="shortcut" onclick="visitUrl('https://www.youtube.com')">
                            <div class="shortcut-icon">Y</div>
                            <div class="shortcut-name">YouTube</div>
                        </div>
                        <div class="shortcut" onclick="visitUrl('https://www.facebook.com')">
                            <div class="shortcut-icon">F</div>
                            <div class="shortcut-name">Facebook</div>
                        </div>
                        <div class="shortcut" onclick="visitUrl('https://www.chess.com')">
                            <div class="shortcut-icon">C</div>
                            <div class="shortcut-name">Chess</div>
                        </div>
                    </div>
                </div>`;
                updateNavButtons();
                return;
            }

            // Re-render the "opened" confirmation for this tab without re-triggering window.open
            // (used for tab switches / back / forward).
            renderOpenedPage(tab.url, false, tab.label);
            updateTabTitle(currentTabId, tab.label || new URL(tab.url).hostname);
            updateNavButtons();
        }

        function updateNavButtons() {
            const tab = getCurrentTab();
            document.getElementById('backBtn').disabled = tab.historyIndex <= 0;
            document.getElementById('forwardBtn').disabled = tab.historyIndex >= tab.history.length - 1;
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                navigateTo();
            }
        }

        // Initialize
        updateNavButtons();
    </script>
</body>
</html>
